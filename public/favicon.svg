<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" fill="#ffffff"/>
  <!-- 凸型校舎：中央棟が高く、左右の棟が低い -->
  <path d="M5 40 V22 H16 V12 H32 V22 H43 V40 Z" fill="#ffffff" stroke="#000000" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- 中央棟（凸の出っ張り部分）に時計 -->
  <circle cx="24" cy="18" r="4" fill="#ffffff" stroke="#000000" stroke-width="1.4"/>
  <path d="M24 15.6 V18 H26" stroke="#000000" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 左棟の窓（縦横2x2） -->
  <rect x="8" y="26" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="13.5" y="26" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="8" y="33" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="13.5" y="33" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <!-- 右棟の窓（縦横2x2） -->
  <rect x="30.5" y="26" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="36" y="26" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="30.5" y="33" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <rect x="36" y="33" width="4" height="4" rx="0.6" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
  <!-- エントランス -->
  <rect x="21" y="32" width="6" height="8" rx="1" fill="#ffffff" stroke="#000000" stroke-width="1.1"/>
</svg>
